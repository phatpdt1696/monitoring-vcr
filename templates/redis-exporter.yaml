{{- if .Values.redisExporter.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: monitoring
  labels:
    app: redis-exporter
    {{- include "monitoring-exporters.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: exporter
          image: {{ .Values.redisExporter.image }}
          env:
            - name: REDIS_ADDR
              value: "redis://{{ .Values.redisExporter.redis.host }}:{{ .Values.redisExporter.redis.port }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-exporter-secret
                  key: redis-password
          ports:
            - containerPort: 9121
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
          resources:
            {{- toYaml .Values.redisExporter.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: monitoring
  labels:
    app: redis-exporter
    {{- include "monitoring-exporters.labels" . | nindent 4 }}
spec:
  selector:
    app: redis-exporter
  ports:
    - name: http
      port: 9121
      targetPort: http
{{- end }}
